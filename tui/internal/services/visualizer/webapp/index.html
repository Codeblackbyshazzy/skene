<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Skene — Journey Visualizer</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #E1E1E1;
      color: #141414;
    }

    .react-flow__node { font-family: inherit; }

    /* Subject card */
    .node-subject {
      background: #ffffff;
      border: 1px solid #d0d7de;
      box-shadow: 0 1px 2px rgba(31, 35, 40, 0.06);
      border-radius: 10px;
      padding: 22px 16px;
      min-width: 280px;
      max-width: 320px;
    }
    .node-subject .node-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .node-subject .node-title {
      font-size: 15px;
      font-weight: 600;
      color: #141414;
      text-transform: capitalize;
    }
    .node-subject .node-meta {
      font-size: 12px;
      color: #4A4A4A;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
    .badge {
      display: inline-block;
      font-size: 9px;
      font-weight: 300;
      padding: 2px 0px;
      border-radius: 0px;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .badge-actor  { background: #dafbe1; color: #28AF85; }
    .badge-entity { background: #ddf4ff; color: #0550ae; }
    .badge-ui     { background: #fbefff; color: #6639ba; }
    .badge-milestone { background: #dafbe1; color: #116329; }
    .badge-value  { background: #fff1e5; color: #bc4c00; }

    .badge-stage-discovery   { color: #FAF1E9; }
    .badge-stage-onboarding  { color: #FAF1E9; }
    .badge-stage-activation  { color: #FAF1E9; }
    .badge-stage-engagement  { color: #FAF1E9; }
    .badge-stage-retention   { color: #FAF1E9; }
    .badge-stage-expansion   { color: #FAF1E9; }
    .badge-stage-virality    { color: #FAF1E9; }

    /* Stage column header */
    .node-stage {
      background: #141414;
      border: 0px solid #141414;
      box-shadow: 0 1px 2px rgba(31, 35, 40, 0.06);
      border-radius: 10px;
      padding: 22px 16px;
      min-width: 360px;
      max-width: 360px;
    }
    .node-stage > .badge {
      display: inline-block;
      margin-bottom: 8px;
    }
    .node-stage .node-title {
      font-size: 22px;
      font-weight: 400;
      color: #FAF1E9;
      margin-bottom: 6px;
    }
    .node-stage .node-subtitle {
      font-size: 12px;
      color: #737373;
      font-style: italic;
      margin-bottom: 10px;
    }
    .node-stage .node-meta {
      font-size: 11px;
      color: #737373;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    /* Milestone card */
    .node-milestone {
      background: #ffffff;
      border: 1px solid #d0d7de;
      box-shadow: 0 1px 2px rgba(31, 35, 40, 0.06);
      border-radius: 10px;
      padding: 22px 16px;
      min-width: 360px;
      max-width: 360px;
    }
    .node-milestone .node-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 6px;
    }
    .node-milestone .node-title {
      font-size: 14px;
      font-weight: 600;
      color: #1f2328;
      line-height: 1.3;
    }
    .node-milestone .node-desc {
      font-size: 12px;
      color: #656d76;
      line-height: 1.5;
      margin-bottom: 12px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .node-milestone .node-meta {
      font-size: 11px;
      color: #656d76;
      font-family: 'SF Mono', 'Fira Code', monospace;
      margin-bottom: 8px;
    }
    .node-milestone .evidence-list {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 4px;
    }
    .evidence-chip {
      display: inline-block;
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 4px;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }
    .evidence-code { background: #ddf4ff; color: #0550ae; }
    .evidence-db   { background: #dafbe1; color: #116329; }
    .evidence-config { background: #fbefff; color: #6639ba; }

    /* Product banner */
    .node-product {
      background: #ffffff;
      border: 1px solid #d0d7de;
      box-shadow: 0 1px 2px rgba(31, 35, 40, 0.06);
      border-radius: 10px;
      padding: 12px 18px;
      min-width: 260px;
    }
    .node-product .node-title {
      font-size: 16px;
      font-weight: 700;
      color: #1f2328;
    }
    .node-product .node-meta {
      font-size: 11px;
      color: #656d76;
      margin-top: 4px;
    }

    /* Feature card */
    .node-feature {
      background: #ffffff;
      border: 1px solid #d0d7de;
      box-shadow: 0 1px 2px rgba(31, 35, 40, 0.06);
      border-radius: 10px;
      padding: 16px 18px;
      min-width: 260px;
      max-width: 320px;
    }
    .node-feature .node-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 8px;
    }
    .node-feature .node-title {
      font-size: 14px;
      font-weight: 600;
      color: #1f2328;
      line-height: 1.3;
    }
    .node-feature .node-desc {
      font-size: 12px;
      color: #656d76;
      line-height: 1.5;
      margin-bottom: 10px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .node-feature .node-source {
      font-size: 11px;
      color: #656d76;
      font-family: 'SF Mono', 'Fira Code', monospace;
      margin-bottom: 8px;
    }
    .node-feature .node-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    .tag {
      display: inline-block;
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 4px;
      background: #ddf4ff;
      color: #0550ae;
      font-family: 'SF Mono', 'Fira Code', monospace;
    }

    .badge-lifecycle {
      background: #fbefff;
      color: #6639ba;
    }

    /* Action card */
    .node-action {
      background: #ffffff;
      border: 1px solid #d0d7de;
      box-shadow: 0 1px 2px rgba(31, 35, 40, 0.06);
      border-radius: 10px;
      padding: 14px 18px;
      min-width: 160px;
    }
    .node-action .node-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }
    .node-action .node-title {
      font-size: 13px;
      font-weight: 600;
      color: #1f2328;
      text-transform: capitalize;
    }
    .node-action .node-meta {
      font-size: 11px;
      color: #656d76;
    }

    .badge-action { background: #fff1e5; color: #bc4c00; }

    /* Edge labels */
    .react-flow__edge-textbg { fill: #ffffff; }
    .react-flow__edge-text { fill: #656d76; font-size: 11px; }

    /* Handles */
    .react-flow__handle {
      width: 8px;
      height: 8px;
      background: #d0d7de;
      border: 2px solid #8c959f;
    }
  </style>
</head>
<body>
  <div id="root" style="width:100vw;height:100vh"></div>

  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@18.3.1",
      "react-dom": "https://esm.sh/react-dom@18.3.1",
      "react-dom/client": "https://esm.sh/react-dom@18.3.1/client",
      "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime",
      "@xyflow/react": "https://esm.sh/@xyflow/react@12.10.2?external=react,react-dom"
    }
  }
  </script>

  <link rel="stylesheet" href="https://esm.sh/@xyflow/react@12.10.2/dist/style.css" />

  <script type="module">
    import React, { useState, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    import {
      ReactFlow, Background, Controls, MiniMap, Handle, Position,
    } from '@xyflow/react';

    const h = React.createElement;

    function stageBadgeClass(stageId) {
      return `badge badge-stage-${stageId || 'discovery'}`;
    }

    function ProductNode({ data }) {
      return h('div', { className: 'node-product' },
        h('div', { className: 'node-title' }, data.name),
        data.generatedAt ? h('div', { className: 'node-meta' }, `Generated ${data.generatedAt}`) : null,
        data.layerLabel ? h('div', { className: 'node-meta', style: { marginTop: 4 } }, data.layerLabel) : null,
      );
    }

    function StageNode({ data }) {
      return h('div', { className: 'node-stage' },
        h(Handle, { type: 'source', position: Position.Right }),
        h(Handle, { type: 'target', position: Position.Left }),
        h(Handle, { type: 'source', position: Position.Bottom, id: 'milestones' }),
        h('span', { className: stageBadgeClass(data.stageId) }, data.stageId),
        h('div', { className: 'node-title' }, data.name),
        data.subtitle ? h('div', { className: 'node-subtitle' }, data.subtitle) : null,
        h('div', { className: 'node-meta' },
          data.layerLabel ? h('span', null, data.layerLabel) : null,
          h('span', null, `${data.count} milestone${data.count === 1 ? '' : 's'}`),
        ),
      );
    }

    function MilestoneNode({ data }) {
      return h('div', { className: 'node-milestone' },
        h(Handle, { type: 'target', position: Position.Top }),
        h(Handle, { type: 'source', position: Position.Bottom }),
        h('div', { className: 'node-header' },
          h('span', { className: 'node-title' }, data.name),
          h('span', { className: stageBadgeClass(data.stageId) }, `#${data.order}`),
        ),
        data.description ? h('div', { className: 'node-desc' }, data.description) : null,
        data.trackedEvent ? h('div', { className: 'node-meta' }, `event: ${data.trackedEvent}`) : null,
        typeof data.confidence === 'number'
          ? h('div', { className: 'node-meta' }, `confidence: ${data.confidence.toFixed(2)}`)
          : null,
        data.evidence && data.evidence.length
          ? h('div', { className: 'evidence-list' },
              ...data.evidence.map((ev, i) => h('span', {
                key: i,
                className: `evidence-chip evidence-${ev.source}`,
                title: ev.reason || '',
              }, `${ev.source}: ${ev.label}`)),
            )
          : null,
      );
    }

    const nodeTypes = { product: ProductNode, stage: StageNode, milestone: MilestoneNode };

    // journey.yaml shape:
    //   product.{name, generated_at, ...}
    //   layers[].{id, name, spans_stages: [stage_id, ...]}
    //   stages[].{id, order, name, subtitle, milestones[], kpis[]}
    //     milestones[].{id, order, name, description, evidence[], tracked_event, confidence}
    //       evidence[].{source: code|db|config, reason, path?, table?}
    //   connectors[]  (empty in v1)
    function buildGraph(doc) {
      const nodes = [];
      const edges = [];
      const stages = (doc?.stages || []).slice().sort((a, b) => (a.order || 0) - (b.order || 0));
      const layers = doc?.layers || [];
      const product = doc?.product || {};

      // Map each stage_id -> layer name so we can show grouping.
      const layerByStage = {};
      layers.forEach((layer) => {
        (layer.spans_stages || []).forEach((sid) => {
          layerByStage[sid] = layer.name || layer.id;
        });
      });

      const COL_WIDTH = 380;
      const STAGE_Y = 0;
      const MILESTONE_BASE_Y = 160;
      const MILESTONE_GAP = 240;

      // Product banner sits left of the first stage column.
      nodes.push({
        id: '__product',
        type: 'product',
        position: { x: -COL_WIDTH, y: STAGE_Y },
        data: {
          name: product.name || 'Product',
          generatedAt: product.generated_at || '',
          layerLabel: layers.length ? `${layers.length} layer${layers.length === 1 ? '' : 's'}, ${stages.length} stage${stages.length === 1 ? '' : 's'}` : '',
        },
      });

      stages.forEach((stage, stageIdx) => {
        const x = stageIdx * COL_WIDTH;
        const milestones = stage.milestones || [];
        const stageNodeId = `stage__${stage.id}`;

        nodes.push({
          id: stageNodeId,
          type: 'stage',
          position: { x, y: STAGE_Y },
          data: {
            stageId: stage.id,
            name: stage.name || stage.id,
            subtitle: stage.subtitle || '',
            layerLabel: layerByStage[stage.id] || '',
            count: milestones.length,
          },
        });

        // Horizontal edge: stage -> next stage (left-to-right funnel).
        if (stageIdx > 0) {
          const prev = stages[stageIdx - 1];
          edges.push({
            id: `e-stage-${prev.id}-${stage.id}`,
            source: `stage__${prev.id}`,
            target: stageNodeId,
            type: 'smoothstep',
            style: { stroke: '#4A4A4A', strokeWidth: 1.5 },
            animated: false,
          });
        }

        let prevMilestoneId = null;
        milestones
          .slice()
          .sort((a, b) => (a.order || 0) - (b.order || 0))
          .forEach((m, i) => {
            const id = `m__${stage.id}__${m.id}`;
            nodes.push({
              id,
              type: 'milestone',
              position: { x, y: MILESTONE_BASE_Y + i * MILESTONE_GAP },
              data: {
                stageId: stage.id,
                order: m.order,
                name: m.name || m.id,
                description: m.description || '',
                trackedEvent: m.tracked_event || '',
                confidence: typeof m.confidence === 'number' ? m.confidence : undefined,
                evidence: (m.evidence || []).map((ev) => ({
                  source: ev.source || 'code',
                  label: ev.path || ev.table || ev.source || '',
                  reason: ev.reason || '',
                })),
              },
            });

            // Vertical edge: stage -> first milestone, then milestone -> milestone.
            const sourceId = prevMilestoneId || stageNodeId;
            const sourceHandle = prevMilestoneId ? undefined : 'milestones';
            edges.push({
              id: `e-${sourceId}-${id}`,
              source: sourceId,
              sourceHandle,
              target: id,
              type: 'smoothstep',
              style: { stroke: '#4A4A4A20', strokeWidth: 1.5 },
              animated: false,
            });
            prevMilestoneId = id;
          });
      });

      return { nodes, edges };
    }

    function App() {
      const [result, setResult] = useState(null);
      const [error, setError] = useState(null);

      useEffect(() => {
        fetch('/api/data')
          .then(r => { if (!r.ok) throw new Error('Failed to load'); return r.json(); })
          .then(d => setResult(d))
          .catch(e => setError(e.message));
      }, []);

      if (error) return h('div', { style: { padding: 40, color: '#cf222e' } }, 'Error: ' + error);
      if (!result) return h('div', { style: { padding: 40, color: '#656d76' } }, 'Loading\u2026');

      const graph = buildGraph(result.data);

      return h('div', { style: { width: '100vw', height: '100vh' } },
        h(ReactFlow, {
          defaultNodes: graph.nodes,
          defaultEdges: graph.edges,
          nodeTypes,
          fitView: true,
          colorMode: 'light',
          minZoom: 0.3,
          defaultEdgeOptions: { type: 'smoothstep' },
          proOptions: { hideAttribution: true },
        },
          h(Background, { gap: 20, size: 2, color: '#C7C7C7' }),
          h(Controls, { showInteractive: false }),
          h(MiniMap, {
            nodeColor: '#d0d7de',
            maskColor: 'rgba(246, 248, 250, 0.85)',
            style: { background: '#f6f8fa' },
          }),
        )
      );
    }

    createRoot(document.getElementById('root')).render(h(App));
  </script>
</body>
</html>
